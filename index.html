<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2a6c">
  <title>Karakuş Devriye Yönetim Platformu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  
  <div id="toastContainer" class="toast-container"></div>

  <div id="alertModal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-icon" id="modalIcon">⚠️</div>
      <h3 id="modalTitle">Sistem Uyarısı</h3>
      <p id="modalMessage"></p>
      <button class="btn btn-primary" id="modalBtn">Okudum, Anladım</button>
    </div>
  </div>

  <div class="container" id="app">
    <div id="loginScreen">
      <img src="https://drive.google.com/uc?export=download&id=1z5rquZ6yvNOa6yRV9q2I1cW4g8ATwUbx" alt="Karakuş Logo" style="width: 140px; height: 140px; object-fit: contain; margin-bottom: 20px; border-radius: 12px;">
      <h2>Karakuş Güvenlik</h2>
      <p class="subtitle">Platforma erişmek için giriş yapın</p>
      <div id="g_id_signin" class="google-btn-wrapper"></div>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="header-card">
        <div class="user-info">
          <div class="user-avatar" id="userInitial">?</div>
          <div class="user-details">
            <div class="user-name" id="displayName">Yükleniyor...</div>
            <div class="network-status" id="networkStatus">🟢 Çevrimiçi</div>
          </div>
        </div>
      </div>

      <div class="scanner-card">
        <h2>📷 Devriye Noktası Okut</h2>
        <div id="reader"></div>
        <p id="scanResult" class="scan-status">Sistem Hazır. Kamera bekleniyor...</p>
      </div>

      <div class="actions">
        <button class="btn btn-outline" id="stopScanBtn">⏸️ Kamerayı Yeniden Başlat</button>
        <button class="btn btn-danger" id="logoutBtn">🚪 Güvenli Çıkış</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered')).catch(err => console.log('SW Failed', err));
      });
    }
  </script>
</body>
</html>
