<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Devriye Takip</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Html5-QRCode kütüphanesi -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .hidden { display: none !important; }

    .logo-icon { font-size: 60px; margin-bottom: 10px; }
    h2 { color: #1a2a6c; margin-bottom: 5px; font-size: 24px; }
    .subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f0f4ff;
      border-radius: 12px;
      padding: 10px 15px;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 40px; height: 40px;
      background: #1a2a6c;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .user-name { font-weight: 600; color: #1a2a6c; }
    .user-email { font-size: 11px; color: #888; }

    #reader {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin: 15px 0;
      border: 2px solid #ddd;
    }
    #scanResult {
      font-size: 16px;
      font-weight: 600;
      margin: 15px 0;
      min-height: 30px;
      color: #2e7d32;
    }

    #warningBox {
      background: #fff3cd;
      border-left: 6px solid #ffc107;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
    }
    #warningBox strong { display: block; margin-bottom: 5px; color: #856404; }
    #warningText { color: #856404; font-size: 14px; line-height: 1.5; }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 8px 0;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a2a6c; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-outline { background: transparent; border: 2px solid #1a2a6c; color: #1a2a6c; }

    .blocked-icon { font-size: 70px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container" id="app">

    <!-- ==================== GİRİŞ EKRANI ==================== -->
    <div id="loginScreen">
      <div class="logo-icon">🔒</div>
      <h2>Devriye Takip</h2>
      <p class="subtitle">Devam etmek için Google hesabınızla giriş yapın</p>
      <div id="g_id_signin"></div>
      <p style="margin-top:15px; font-size:12px; color:#999;">İlk girişte hesabınız otomatik kaydedilir.</p>
    </div>

    <!-- ==================== ANA EKRAN ==================== -->
    <div id="mainScreen" class="hidden">
      <div class="user-info">
        <div class="user-avatar" id="userInitial">?</div>
        <div>
          <div class="user-name" id="displayName">Bilinmiyor</div>
          <div class="user-email" id="displayEmail"></div>
        </div>
      </div>

      <div id="warningBox" class="hidden">
        <strong>⚠️ Yönetici Uyarısı</strong>
        <p id="warningText"></p>
        <button class="btn btn-warning" id="warningOkBtn" style="margin-top:15px;">Okudum, Devam Et</button>
      </div>

      <h2>📷 Noktayı Okut</h2>
      <div id="reader"></div>
      <p id="scanResult"></p>

      <button class="btn btn-outline" id="stopScanBtn">⏹️ Taramayı Durdur</button>
      <button class="btn btn-danger" id="logoutBtn">🚪 Çıkış Yap</button>
    </div>

    <!-- ==================== ENGELLİ EKRANI ==================== -->
    <div id="blockedScreen" class="hidden">
      <div class="blocked-icon">⛔</div>
      <h2>Giriş Engellendi</h2>
      <p style="color:#666; margin:15px 0;">Hesabınız yönetici tarafından devre dışı bırakılmıştır.<br>Lütfen yöneticinizle iletişime geçin.</p>
    </div>

  </div>

  <script>
    // ==================== DEĞİŞTİRİLMESİ GEREKEN YER ====================
    const SCRIPT_URL = https://script.google.com/macros/s/AKfycbyXnLMCDiqyPHkM36MiLKo43SWCEeJTeMoKr_ZxHxA3SI_i71JyAuQciTDCpIr6DU9mUQ/exec; // ← 1. adımdaki yeni URL'yi buraya yapıştır
    const CLIENT_ID = '653251016114-4340l82dqeldg25umf3749gr9b4aj8gn.apps.googleusercontent.com';
    // =================================================================

    let currentUser = null;
    let html5QrCode = null;
    let isScanning = false;

    // GIS'i sadece bir kere başlat
    function initializeGIS() {
      console.log('GIS başlatılıyor...');
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        prompt: 'select_account'
      });
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { theme: 'outline', size: 'large', type: 'standard', text: 'sign_in_with', shape: 'rectangular', width: 300 }
      );
      google.accounts.id.prompt((notification) => {
        console.log('Prompt:', notification);
      });
    }

    window.onload = initializeGIS;

    async function handleCredentialResponse(response) {
      console.log('Kimlik bilgisi alındı.');
      const token = response.credential;

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'verifyUser', token: token })
        });
        const data = await res.json();
        console.log('Sunucu yanıtı:', data);

        if (data.status === 'active') {
          currentUser = {
            email: data.email,
            name: data.name,
            initial: data.name ? data.name.charAt(0).toUpperCase() : '?'
          };
          onLoginSuccess();
        } else if (data.status === 'disabled') {
          showScreen('blockedScreen');
        } else {
          alert('Doğrulama başarısız.');
          showScreen('loginScreen');
        }
      } catch (error) {
        console.error('Doğrulama hatası:', error);
        alert('Bağlantı hatası. Lütfen sayfayı yenileyin.');
        showScreen('loginScreen');
      }
    }

    function onLoginSuccess() {
      document.getElementById('displayName').textContent = currentUser.name;
      document.getElementById('displayEmail').textContent = currentUser.email;
      document.getElementById('userInitial').textContent = currentUser.initial;
      showScreen('mainScreen');
      checkWarningMessage();
      startScanner();
    }

    async function checkWarningMessage() {
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getWarning' })
        });
        const data = await res.json();
        if (data.warning) {
          document.getElementById('warningText').textContent = data.warning;
          document.getElementById('warningBox').classList.remove('hidden');
          stopScanner();
        }
      } catch (e) { console.error('Uyarı hatası:', e); }
    }

    document.getElementById('warningOkBtn').addEventListener('click', () => {
      document.getElementById('warningBox').classList.add('hidden');
      startScanner();
    });

    function startScanner() {
      if (isScanning) return;
      document.getElementById('reader').innerHTML = '';
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanFailure
      ).then(() => { isScanning = true; }).catch(err => {
        document.getElementById('scanResult').innerHTML = '❌ Kamera açılamadı.';
      });
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => { isScanning = false; });
      }
    }

    document.getElementById('stopScanBtn').addEventListener('click', () => {
      stopScanner();
      document.getElementById('scanResult').textContent = 'Tarak durduruldu.';
    });

    function onScanSuccess(decodedText) {
      stopScanner();
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => sendScanData(decodedText, pos.coords.latitude, pos.coords.longitude),
          () => sendScanData(decodedText, null, null),
          { timeout: 5000 }
        );
      } else {
        sendScanData(decodedText, null, null);
      }
    }

    function onScanFailure() {}

    async function sendScanData(qrText, lat, lng) {
      document.getElementById('scanResult').textContent = '⏳ Kaydediliyor...';
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveScan',
            qrText: qrText,
            lat: lat, lng: lng,
            email: currentUser?.email || '',
            name: currentUser?.name || '',
            timestamp: new Date().toISOString()
          })
        });
        document.getElementById('scanResult').innerHTML = `✅ <b>${qrText}</b> kaydedildi.`;
        setTimeout(() => { document.getElementById('scanResult').textContent = ''; startScanner(); }, 2000);
      } catch (e) {
        document.getElementById('scanResult').innerHTML = '❌ Kayıt başarısız.';
        setTimeout(() => { document.getElementById('scanResult').textContent = ''; startScanner(); }, 2500);
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      google.accounts.id.disableAutoSelect();
      stopScanner();
      currentUser = null;
      showScreen('loginScreen');
    });

    function showScreen(screenId) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.add('hidden');
      document.getElementById('blockedScreen').classList.add('hidden');
      if (screenId === 'loginScreen') {
        document.getElementById('loginScreen').classList.remove('hidden');
      } else if (screenId === 'mainScreen') {
        document.getElementById('mainScreen').classList.remove('hidden');
      } else if (screenId === 'blockedScreen') {
        document.getElementById('blockedScreen').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
